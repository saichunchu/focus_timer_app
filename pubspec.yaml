name: focus_timer_app
description: "A premium, minimal Pomodoro / Focus Timer app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # Fonts & UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  confetti: ^0.7.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  equatable: ^2.0.5
  share_plus: ^9.0.0
  path: ^1.9.0
  vibration: ^2.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

  # fonts are loaded dynamically via google_fonts; no local font assets required
